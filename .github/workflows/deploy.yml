name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── GitHub Pages permissions ──────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

# ══════════════════════════════════════════════════════════════════
# JOB 1 — Build & deploy frontend to GitHub Pages
# ══════════════════════════════════════════════════════════════════
jobs:
  deploy-frontend:
    name: Frontend → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    defaults:
      run:
        working-directory: caren-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caren-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Full URL of the HF Space backend, e.g. https://tgvenomyt-caren-agent.hf.space
          # Set this in GitHub → Settings → Secrets → Actions
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          # Sub-path for GitHub Pages: /REPO_NAME/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: caren-ui/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

# ══════════════════════════════════════════════════════════════════
# JOB 2 — Sync backend source to HuggingFace Spaces
# ══════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Backend → HuggingFace Spaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/CAREN-agent
          git push hf HEAD:main --force
