name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'caren-ui/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer runs supersede older queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caren-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caren-ui/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Set VITE_BACKEND_URL in the repo as a Variable (Settings →
          # Secrets and variables → Actions → Variables). Example value:
          #   https://<user>-<space>.hf.space
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          # Pages serves the site at /<repo>/ — Vite needs that as base
          # so asset URLs resolve correctly.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: caren-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
