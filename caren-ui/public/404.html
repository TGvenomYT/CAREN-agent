<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: send 404s back to index.html preserving the path
    var l = window.location;
    l.replace(l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash);
  </script>
</head>
<body></body>
</html>
